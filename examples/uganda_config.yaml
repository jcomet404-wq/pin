# Example PIN run: a small area near Jinja, Uganda for January 2023.
bbox: [32.5, 0.0, 33.0, 0.5]        # min_lon, min_lat, max_lon, max_lat
datetime: "2023-01-01/2023-01-31"

collections:
  - sentinel-2-l2a                  # optical: NDVI / NDMI / NDWI
  - landsat-c2-l2                   # thermal: land surface temperature (LST)

indices: [ndvi, ndmi, ndwi, lst]
max_cloud_cover: 10.0
resolution: 20.0                    # metres; coarser = faster
max_items_per_collection: 3

storage:
  backend: local
  root: ./pin_output
  stats_db: stats.sqlite
  write_parquet: false
